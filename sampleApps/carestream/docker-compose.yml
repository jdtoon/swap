services:
  carestream-web:
    image: ${DOCKER_REGISTRY-}carestream.web
    build:
      context: src/web
      dockerfile: Dockerfile
    environment:
      - DOTNET_RUNNING_IN_CONTAINER=true
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:3000
      - Logto:Authority=http://logto:3001/oidc
      - Logto:BaseURL=http://localhost:3001
      - Logto:ClientId=3dpi76r1tcszlcy4gd6x4 # Replace with Client ID from Logto setup
      - Logto:ClientSecret=mbdihDHgyKHB8boUjFX0l4UyeTHb3o5Q # Replace with Client Secret from Logto setup
      - ConnectionStrings:DefaultConnection=Host=postgres;Port=5432;Database=carestream;Username=logto_user;Password=StrongPassword123! # Replace with your database connection string
    depends_on:
      - logto

  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: logto_user
      POSTGRES_PASSWORD: StrongPassword123!
      POSTGRES_DB: logto_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logto_user -d logto_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  logto:
    build:
      context: ./ 
      dockerfile: logto.Dockerfile
    restart: always
    environment:
      DB_URL: postgres://logto_user:StrongPassword123!@postgres:5432/logto_db
      TRUST_PROXY_HEADER: 1
      ENDPOINT: http://localhost:3001
      ADMIN_ENDPOINT: http://localhost:3002
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./logto-entrypoint-wrapper.sh:/usr/local/bin/logto-entrypoint-wrapper.sh
    entrypoint: ["/usr/local/bin/logto-entrypoint-wrapper.sh"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

volumes:
  postgres_data:

