services:
  # The Web Application Service
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5263:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=netmxapp_dev;Username=postgres;Password=postgres
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - netmx-network

  # The PostgreSQL Database Service
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=netmxapp_dev
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - netmx-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - netmx-network

networks:
  netmx-network:
    driver: bridge

volumes:
  netmx-db-data:
    driver: local