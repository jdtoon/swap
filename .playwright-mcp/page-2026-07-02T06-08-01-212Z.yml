        - heading "A server-driven UI toolkit for ASP.NET Core" [level=2] [ref=e45]
        - generic [ref=e46]:
          - paragraph [ref=e47]:
            - strong [ref=e48]: Swap.Htmx
            - text: is a small .NET library that helps you build interactive ASP.NET Core MVC apps using server-rendered HTML. It pairs naturally with
            - link "HTMX" [ref=e49] [cursor=pointer]:
              - /url: https://htmx.org
            - text: so your UI stays “just HTML” while still feeling modern and dynamic.
          - paragraph [ref=e50]: Instead of pushing JSON into a client framework, you return HTML from your controllers. Swap.Htmx makes it easy to return full pages or partial updates, coordinate multi-part UI updates, and keep UI state on the server (without maintaining a big client-side state store).
