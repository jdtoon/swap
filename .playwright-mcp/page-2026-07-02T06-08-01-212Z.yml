          - heading "The Problem" [level=3] [ref=e77]
          - generic [ref=e78]:
            - paragraph [ref=e79]: Modern web development shouldn't require learning an entirely new paradigm.
            - paragraph [ref=e80]: HTML was designed to be stateless. Forms submit. Servers respond. The web was simple, fast, and accessible to everyone.
            - paragraph [ref=e81]: Then we added JavaScript frameworks to make things "interactive" — and lost that simplicity. State management, build pipelines, hydration... all for a dashboard or form-heavy app?
        - generic [ref=e83]:
          - heading "The Solution" [level=3] [ref=e84]
          - generic [ref=e85]:
            - paragraph [ref=e86]:
              - strong [ref=e87]: Swap.Htmx brings the simplicity back.
            - paragraph [ref=e88]: Write C# on the server. Return HTML. Let HTMX handle the interactivity. HTML is stateless again. No client-side state synchronization. No context switching between languages.
            - paragraph [ref=e89]:
              - strong [ref=e90]: Just the web, the way it was meant to be.
