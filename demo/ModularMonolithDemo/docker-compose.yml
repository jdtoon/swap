version: "3.9"
services:
  web:
    build:
      context: ../..
      dockerfile: demo/ModularMonolithDemo/src/Web/Dockerfile
    image: modular-monolith-demo:web
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
    ports:
      - "8080:8080"
