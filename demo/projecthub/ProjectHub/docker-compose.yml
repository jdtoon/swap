services:
  web:
    build:
      context: src
      dockerfile: Web/Dockerfile
    image: projecthub:web
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      # Use Postgres in Docker dev by default
      - Data__Provider=Postgres
      - Data__MigrateOnStartup=true
      - ConnectionStrings__Todos=Host=postgres;Port=5432;Database=todosdb;Username=postgres;Password=postgres
      # Use RabbitMQ distributed server events
      - ServerEvents__Transport=RabbitMq
      - ServerEvents__RabbitMq__HostName=rabbitmq
      - ServerEvents__RabbitMq__UserName=guest
      - ServerEvents__RabbitMq__Password=guest
      - ServerEvents__RabbitMq__VirtualHost=/
      - ServerEvents__RabbitMq__ExchangeName=swap.events
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16
    environment:
      - POSTGRES_DB=todosdb
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d todosdb"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
