name: Wiki - Build (PR)

on:
  push:
    branches: [ develop, main ]
    paths:
      - 'wiki/**'
  pull_request:
    branches: [ develop, main ]
    paths:
      - 'wiki/**'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: wiki/package-lock.json

      - name: Install dependencies
        working-directory: ./wiki
        run: npm ci

      - name: Build wiki (Docusaurus)
        working-directory: ./wiki
        run: npm run build
