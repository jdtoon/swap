name: Publish to NuGet

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.0.0)'
        required: true
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - nuget-dev
          - nuget-production

jobs:
  publish-dev:
    if: github.event.inputs.environment == 'nuget-dev' || github.event.release.prerelease == true
    runs-on: ubuntu-latest
    environment: nuget-dev
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
    
    - name: Restore dependencies
      run: dotnet restore framework/NetMX.sln
    
    - name: Build
      run: dotnet build framework/NetMX.sln --configuration Release --no-restore
    
    - name: Run Tests
      run: dotnet test framework/NetMX.sln --configuration Release --no-build
    
    - name: Pack with Pre-release Version
      run: |
        VERSION="${{ github.event.inputs.version || github.ref_name }}"
        dotnet pack framework/NetMX.sln \
          --configuration Release \
          --no-build \
          --output ./nupkg \
          /p:Version=${VERSION}-beta
    
    - name: Push to GitHub Packages (Dev/Testing)
      run: |
        dotnet nuget push ./nupkg/*.nupkg \
          --api-key ${{ secrets.GITHUB_TOKEN }} \
          --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json \
          --skip-duplicate
    
    - name: Create Build Summary
      run: |
        echo "### 📦 Published Packages (DEV)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Published to: GitHub Packages (Development)" >> $GITHUB_STEP_SUMMARY
        echo "Version: ${VERSION}-beta" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        ls -la ./nupkg/*.nupkg >> $GITHUB_STEP_SUMMARY

  publish-production:
    if: github.event.inputs.environment == 'nuget-production' || (github.event_name == 'release' && github.event.release.prerelease == false)
    runs-on: ubuntu-latest
    environment: nuget-production
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
    
    - name: Restore dependencies
      run: dotnet restore framework/NetMX.sln
    
    - name: Build
      run: dotnet build framework/NetMX.sln --configuration Release --no-restore
    
    - name: Run Tests
      run: dotnet test framework/NetMX.sln --configuration Release --no-build
    
    - name: Pack with Release Version
      run: |
        VERSION="${{ github.event.inputs.version || github.ref_name }}"
        # Remove 'v' prefix if present (e.g., v1.0.0 -> 1.0.0)
        VERSION=${VERSION#v}
        dotnet pack framework/NetMX.sln \
          --configuration Release \
          --no-build \
          --output ./nupkg \
          /p:Version=${VERSION}
    
    - name: Push to NuGet.org (Production)
      run: |
        dotnet nuget push ./nupkg/*.nupkg \
          --api-key ${{ secrets.NUGET_API_KEY }} \
          --source https://api.nuget.org/v3/index.json \
          --skip-duplicate
    
    - name: Create Build Summary
      run: |
        echo "### 🚀 Published Packages (PRODUCTION)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Published to: NuGet.org" >> $GITHUB_STEP_SUMMARY
        echo "Version: ${VERSION}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        ls -la ./nupkg/*.nupkg >> $GITHUB_STEP_SUMMARY
