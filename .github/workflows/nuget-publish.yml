name: Publish to NuGet

on:
  push:
    branches:
      - develop
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (e.g., 0.1.0)'
        required: true

permissions:
  contents: write  # Required to create tags and releases

jobs:
  publish:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Fetch all history for tag creation
    
    - name: Configure NuGet sources for publish
      run: |
        cat > nuget.config << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <configuration>
          <packageSources>
            <clear />
            <add key="nuget.org" value="https://api.nuget.org/v3/index.json" protocolVersion="3" />
            <add key="local" value=".nuget/local" />
          </packageSources>
        </configuration>
        EOF

    - name: Prepare local feed directory
      run: |
        mkdir -p .nuget/local
        echo "Prepared local NuGet feed at .nuget/local"

    - name: Pack library packages to local feed
      run: |
        dotnet pack lib/Swap.Htmx/Swap.Htmx.csproj --configuration Release --output ./.nuget/local
        dotnet pack lib/Swap.Htmx.Realtime/Swap.Htmx.Realtime.csproj --configuration Release --output ./.nuget/local
        dotnet pack lib/Swap.Htmx.Realtime.Redis/Swap.Htmx.Realtime.Redis.csproj --configuration Release --output ./.nuget/local
        dotnet pack lib/Swap.Testing/Swap.Testing.csproj --configuration Release --output ./.nuget/local
        dotnet pack templates/Swap.Templates.csproj --configuration Release --output ./.nuget/local
      env:
        DOTNET_NUGET_SIGNATURE_VERIFICATION: false
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
    
    - name: Extract version from Swap.Htmx.csproj
      id: version
      run: |
        VERSION=$(grep -oP '<Version>\K[^<]+' lib/Swap.Htmx/Swap.Htmx.csproj)
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "tag=v$VERSION" >> $GITHUB_OUTPUT
        echo "📦 Version: $VERSION"
    
    - name: Check if tag already exists
      id: check_tag
      run: |
        if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
          echo "exists=true" >> $GITHUB_OUTPUT
          echo "⚠️ Tag v${{ steps.version.outputs.version }} already exists"
        else
          echo "exists=false" >> $GITHUB_OUTPUT
          echo "✅ Tag v${{ steps.version.outputs.version }} does not exist yet"
        fi
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Build
      run: dotnet build --configuration Release --no-restore
    
    - name: Run tests
      run: dotnet test --configuration Release --no-restore --verbosity normal
    
    - name: Pack and Publish Packages
      run: |
        # Pack library packages
        dotnet pack lib/Swap.Htmx/Swap.Htmx.csproj --configuration Release --no-restore --output ./nupkg
        dotnet pack lib/Swap.Htmx.Realtime/Swap.Htmx.Realtime.csproj --configuration Release --no-restore --output ./nupkg
        dotnet pack lib/Swap.Htmx.Realtime.Redis/Swap.Htmx.Realtime.Redis.csproj --configuration Release --no-restore --output ./nupkg
        dotnet pack lib/Swap.Testing/Swap.Testing.csproj --configuration Release --no-restore --output ./nupkg
        dotnet pack templates/Swap.Templates.csproj --configuration Release --no-restore --output ./nupkg
        
        # Publish all packages (skip-duplicate will handle already published versions)
        dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
      env:
        NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
    
    - name: Extract changelog for version
      if: steps.check_tag.outputs.exists == 'false'
      id: changelog
      run: |
        VERSION=${{ steps.version.outputs.version }}
        echo "Release $VERSION" > release-notes.md
        echo "" >> release-notes.md
        echo "Swap.Htmx $VERSION" >> release-notes.md
    
    - name: Create Git tag
      if: steps.check_tag.outputs.exists == 'false'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.version }}"
        git push origin "${{ steps.version.outputs.tag }}"
        echo "✅ Tag ${{ steps.version.outputs.tag }} created and pushed"
    
    - name: Create GitHub Release
      if: steps.check_tag.outputs.exists == 'false'
      uses: softprops/action-gh-release@v1
      with:
        name: Swap ${{ steps.version.outputs.tag }}
        tag_name: ${{ steps.version.outputs.tag }}
        body_path: release-notes.md
        files: |
          nupkg/*.nupkg
        draft: false
        prerelease: ${{ contains(steps.version.outputs.version, '-') }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: nuget-packages
        path: ./nupkg/*.nupkg
    
    - name: Summary
      run: |
        echo "📦 Packages published to NuGet.org"
        echo "ℹ️ Already published versions are automatically skipped"
