name: CI Build

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Remove local NuGet source for CI
      run: |
        cat > nuget.config << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <configuration>
          <packageSources>
            <clear />
            <add key="nuget.org" value="https://api.nuget.org/v3/index.json" protocolVersion="3" />
          </packageSources>
        </configuration>
        EOF
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Build
      run: dotnet build --configuration Release --no-restore
    
    - name: Run tests
      run: dotnet test --configuration Release --no-restore --verbosity normal
    
    - name: Pack CLI
      run: dotnet pack tools/Swap.CLI/Swap.CLI.csproj --configuration Release --no-build --output ./nupkg

    - name: Pack Patterns
      run: dotnet pack framework/Swap.Patterns/Swap.Patterns.csproj --configuration Release --no-build --output ./nupkg

    - name: Pack Testing
      run: dotnet pack framework/Swap.Testing/Swap.Testing.csproj --configuration Release --no-build --output ./nupkg
