name: CI Build & Test

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
    
    - name: Restore dependencies
      run: dotnet restore framework/NetMX.sln
    
    - name: Build Framework
      run: dotnet build framework/NetMX.sln --configuration Release --no-restore
    
    - name: Build Template
      run: dotnet build templates/modular/NetMXApp.sln --configuration Release --no-restore
    
    - name: Run Tests
      run: dotnet test framework/NetMX.sln --configuration Release --no-build --verbosity normal
    
    - name: Pack NuGet Packages (Dry Run)
      run: dotnet pack framework/NetMX.sln --configuration Release --no-build --output ./nupkg
    
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: nuget-packages
        path: ./nupkg/*.nupkg
        retention-days: 7
