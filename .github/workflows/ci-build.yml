name: CI Build

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Configure NuGet sources for CI
      run: |
        cat > nuget.config << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <configuration>
          <packageSources>
            <clear />
            <add key="nuget.org" value="https://api.nuget.org/v3/index.json" protocolVersion="3" />
            <add key="local" value=".nuget/local" />
          </packageSources>
        </configuration>
        EOF
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Prepare local feed directory
      run: |
        mkdir -p .nuget/local
        echo "Prepared local NuGet feed at .nuget/local"

    - name: Pack framework packages to local feed
      run: |
        dotnet pack framework/Swap.Htmx/Swap.Htmx.csproj --configuration Release --output ./.nuget/local
        dotnet pack framework/Swap.Patterns/Swap.Patterns.csproj --configuration Release --output ./.nuget/local
        dotnet pack framework/Swap.Testing/Swap.Testing.csproj --configuration Release --output ./.nuget/local
      env:
        DOTNET_NUGET_SIGNATURE_VERIFICATION: false
    
    - name: Restore dependencies
      run: dotnet restore
    
    # Frontend toolchain for Tailwind/DaisyUI CSS build in demo apps
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'

    - name: Install frontend deps (EventSystemIT)
      run: npm ci
      working-directory: demo/EventSystemIT

    - name: Install frontend deps (MonolithDemo)
      run: npm ci
      working-directory: demo/MonolithDemo

    - name: Build
      run: dotnet build --configuration Release --no-restore
    
    - name: Run tests
      run: dotnet test --configuration Release --no-restore --verbosity normal
    
    - name: Pack packages (artifacts)
      run: |
        dotnet pack framework/Swap.Htmx/Swap.Htmx.csproj --configuration Release --no-restore --output ./nupkg
        dotnet pack framework/Swap.Patterns/Swap.Patterns.csproj --configuration Release --no-restore --output ./nupkg
        dotnet pack framework/Swap.Testing/Swap.Testing.csproj --configuration Release --no-restore --output ./nupkg
        dotnet pack tools/Swap.CLI/Swap.CLI.csproj --configuration Release --no-restore --output ./nupkg

    # Publishing/uploading of packages is handled in a separate workflow; no upload here.
