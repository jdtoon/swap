<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background -->
  <rect width="128" height="128" fill="#00D1B2" rx="16"/>
  
  <!-- NetMX Text -->
  <text x="64" y="50" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">NetMX</text>
  
  <!-- Simplified Circuit/Network Pattern -->
  <g stroke="white" stroke-width="3" fill="none" opacity="0.9">
    <!-- Horizontal lines -->
    <line x1="20" y1="70" x2="108" y2="70"/>
    <line x1="20" y1="90" x2="108" y2="90"/>
    
    <!-- Vertical connections -->
    <line x1="35" y1="70" x2="35" y2="90"/>
    <line x1="64" y1="70" x2="64" y2="90"/>
    <line x1="93" y1="70" x2="93" y2="90"/>
    
    <!-- Nodes -->
    <circle cx="35" cy="70" r="4" fill="white"/>
    <circle cx="64" cy="70" r="4" fill="white"/>
    <circle cx="93" cy="70" r="4" fill="white"/>
    <circle cx="35" cy="90" r="4" fill="white"/>
    <circle cx="64" cy="90" r="4" fill="white"/>
    <circle cx="93" cy="90" r="4" fill="white"/>
  </g>
  
  <!-- HTMX indicator -->
  <text x="64" y="110" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle" opacity="0.8">HTMX-First</text>
</svg>
